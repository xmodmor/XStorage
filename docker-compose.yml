services:
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-xstorage}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-xstorage}
      POSTGRES_DB: ${POSTGRES_DB:-xstorage}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-xstorage}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"
      DATABASE_URL: postgres://${POSTGRES_USER:-xstorage}:${POSTGRES_PASSWORD:-xstorage}@postgres:5432/${POSTGRES_DB:-xstorage}?sslmode=disable
      STORAGE_PATH: /data
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
    volumes:
      - storage_data:/data
    depends_on:
      postgres:
        condition: service_healthy

  dashboard:
    build:
      context: ./dashboard
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NUXT_PUBLIC_API_BASE: http://backend:8080
    depends_on:
      - backend

volumes:
  pgdata:
  storage_data:
