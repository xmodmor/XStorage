name: Deploy to Production

on:
  push:
    branches: [ main ]
    paths-ignore:
      - '**.md'
      - '.gitignore'
      - '.env.example'
      - 'LICENSE'
  workflow_dispatch:  
    inputs:
        environment:
          description: 'Environment to deploy to'
          required: true
          default: 'production'
          type: choice
          options:
            - production
            - staging
        debug_enabled:
          description: 'Enable debug mode'
          required: false
          type: boolean
          default: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write 

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository }}:backend
            ${{ env.REGISTRY }}/${{ github.repository }}:backend-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push dashboard image
        uses: docker/build-push-action@v5
        with:
          context: ./dashboard
          file: ./dashboard/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository }}:dashboard
            ${{ env.REGISTRY }}/${{ github.repository }}:dashboard-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Set debug variables
        id: debug_vars
        run: |
          echo "Debug input value: ${{ github.event.inputs.debug_enabled }}"
          if [ "${{ github.event.inputs.debug_enabled }}" = "true" ]; then
            echo "LOG_LEVEL=DEBUG" >> $GITHUB_ENV
            echo "DEBUG=true" >> $GITHUB_ENV
            echo "Setting LOG_LEVEL to DEBUG"
          else
            echo "LOG_LEVEL=INFO" >> $GITHUB_ENV
            echo "DEBUG=false" >> $GITHUB_ENV
            echo "Setting LOG_LEVEL to INFO"
          fi
          echo "Final LOG_LEVEL will be: ${{ env.LOG_LEVEL }}"

      - name: Deploy to server
        uses: appleboy/ssh-action@master
        env:
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_HOST: ${{ secrets.POSTGRES_HOST }}
          POSTGRES_PORT: ${{ secrets.POSTGRES_PORT != '' && secrets.POSTGRES_PORT || '5440' }}
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          DOCKER_REGISTRY_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          port: ${{ secrets.SERVER_PORT }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: POSTGRES_PASSWORD,POSTGRES_HOST,POSTGRES_USER,POSTGRES_DB,POSTGRES_PORT,JWT_SECRET,GITHUB_SHA,GITHUB_REPOSITORY,DOCKER_REGISTRY_TOKEN,DEBUG,LOG_LEVEL
          script: |
            cd /home/xstorage/app

            # Backup current env file
            if [ -f .env ]; then
              cp .env .env.backup
            fi

            # Copy template file
            cp .env.template .env

            # Replace environment variables in the template
            sed -i "s|\${POSTGRES_HOST}|${POSTGRES_HOST}|g" .env
            sed -i "s|\${POSTGRES_PORT}|${POSTGRES_PORT}|g" .env
            sed -i "s|\${POSTGRES_USER}|${POSTGRES_USER}|g" .env
            sed -i "s|\${POSTGRES_PASSWORD}|${POSTGRES_PASSWORD}|g" .env
            sed -i "s|\${POSTGRES_DB}|${POSTGRES_DB}|g" .env
            sed -i "s|\${JWT_SECRET}|${JWT_SECRET}|g" .env

            echo "GITHUB_REPOSITORY=${GITHUB_REPOSITORY}" >> .env
            
            # Login to GitHub Container Registry
            echo $DOCKER_REGISTRY_TOKEN | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            
            
            if [ ! -f docker-compose.prod.yml ]; then
              echo "Error: docker-compose.prod.yml not found"
              exit 1
            fi
            
            # Pull with authentication
            docker compose -f docker-compose.prod.yml --env-file .env pull
            
            # Start services
            docker compose -f docker-compose.prod.yml --env-file .env up -d
            
            echo "Waiting for services to be healthy..."
            timeout 60s bash -c 'until docker compose -f docker-compose.prod.yml ps | grep "healthy"; do sleep 5; done'
            
            # Cleanup
            docker system prune -af
            
            # Show status
            docker compose -f docker-compose.prod.yml ps
            
            # Logout from registry for security
            docker logout ghcr.io
            
            echo "Deployment completed successfully"